<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Downloader Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #f1f5f9;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        h1 { margin-bottom: 1.5rem; color: #0284c7; }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #cbd5e1;
            border-radius: 0.5rem;
            background-color: #ffffff;
            color: #0f172a;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }
        input:focus { border-color: #0284c7; outline: none; }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #0284c7;
            color: #ffffff;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #0369a1; }
        #result { margin-top: 1.5rem; display: none; }
        .thumbnail { width: 100%; border-radius: 0.5rem; margin-top: 1rem; max-height: 300px; object-fit: cover; }
        .error { color: #ef4444; margin-top: 1rem; word-break: break-all; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h1>Descargador Multi-Plataforma</h1>
    <input type="text" id="videoUrl" placeholder="Pega el enlace de TikTok o Instagram aquí...">
    <button id="actionBtn" onclick="procesarVideo()">Analizar Video</button>

    <div id="result">
        <h3 id="videoTitle"></h3>
        <img id="videoThumb" class="thumbnail" src="" alt="Miniatura">
        <a id="downloadBtn" href="#" style="display: block; margin-top: 1rem;"><button style="background-color: #22c55e;">Descargar Ahora</button></a>
    </div>
    <div id="errorMsg" class="error"></div>
</div>

<script>
    async function procesarVideo() {
        const url = document.getElementById('videoUrl').value.trim();
        const resultDiv = document.getElementById('result');
        const errorMsg = document.getElementById('errorMsg');
        const actionBtn = document.getElementById('actionBtn');
        
        resultDiv.style.display = 'none';
        errorMsg.innerText = '';

        if(!url) {
            errorMsg.innerText = 'Por favor, ingresa una URL válida.';
            return;
        }

        // --- MANEJO DIRECTO DE INSTAGRAM ---
        if (url.includes('instagram.com')) {
            actionBtn.innerText = 'Procesando...';
            try {
                // Extracción híbrida del lado del navegador usando una pasarela CORS directa
                const cleanUrl = url.split('?')[0];
                const res = await fetch(`https://api.scraptik.workers.dev/instagram?url=${encodeURIComponent(cleanUrl)}`);
                const data = await res.json();

                if (data && data.downloadUrl) {
                    document.getElementById('videoTitle').innerText = 'Video de Instagram Listo';
                    document.getElementById('videoThumb').src = data.thumbnail || 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500';
                    
                    // Al ser Instagram, mandamos directo al video para evitar problemas de proxy
                    document.getElementById('downloadBtn').href = data.downloadUrl;
                    document.getElementById('downloadBtn').target = '_blank';
                    
                    resultDiv.style.display = 'block';
                } else {
                    // Plan de rescate alternativo si falla el worker automático
                    window.open(`https://saveig.app/es?url=${encodeURIComponent(url)}`, '_blank');
                    errorMsg.innerText = 'Abriendo el extractor optimizado en una pestaña nueva para saltar el bloqueo...';
                }
            } catch (e) {
                window.open(`https://saveig.app/es?url=${encodeURIComponent(url)}`, '_blank');
                errorMsg.innerText = 'Abriendo el extractor alternativo en una pestaña nueva...';
            } finally {
                actionBtn.innerText = 'Analizar Video';
            }
            return;
        }

        // --- MANEJO DE TIKTOK (Sigue funcionando por el servidor perfectamente) ---
        try {
            const response = await fetch('/api/extract', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            const data = await response.json();

            if(data.success) {
                document.getElementById('videoTitle').innerText = data.title;
                document.getElementById('videoThumb').src = data.thumbnail;
                
                const proxyDownloadUrl = `/api/download-file?url=${encodeURIComponent(data.downloadUrl)}&title=${encodeURIComponent(data.title)}`;
                document.getElementById('downloadBtn').href = proxyDownloadUrl;
                document.getElementById('downloadBtn').target = '_self';
                
                resultDiv.style.display = 'block';
            } else {
                errorMsg.innerText = data.error || 'No se pudo extraer el video.';
            }
        } catch (err) {
            errorMsg.innerText = 'Error de conexión: ' + err.message;
        }
    }
</script>

</body>
</html>
