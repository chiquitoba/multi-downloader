<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargador de Videos de TikTok</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: #0084d6;
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 700;
        }
        .input-container {
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #ccd0d5;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fca0a01a;
        }
        .btn-analizar {
            width: 100%;
            padding: 16px;
            background-color: #0084d6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        .btn-analizar:disabled {
            background-color: #9cd1f5;
            cursor: not-allowed;
        }
        .ad-box {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .ad-top { max-width: 728px; min-height: 90px; }
        .ad-bottom { max-width: 300px; min-height: 250px; }
        
        /* Contenedor de descarga real */
        .result-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed #ccd0d5;
            display: none;
            flex-direction: column;
            gap: 15px;
        }
        .btn-download-real {
            display: inline-block;
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="ad-box ad-top">
        <script type="text/javascript">
            atOptions = {
                'key' : 'a2fc1372fb0ce2568dbe11274debc73d',
                'format' : 'iframe',
                'height' : 90,
                'width' : 728,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/a2fc1372fb0ce2568dbe11274debc73d/invoke.js"></script>
    </div>

    <div class="container">
        <h1>Descargador de Videos de TikTok</h1>
        
        <div class="input-container">
            <input type="text" id="tiktok-url" placeholder="Introduce el enlace de TikTok aquí...">
        </div>
        
        <button class="btn-analizar" id="btn-action">Obtener Enlaces de Descarga</button>

        <div class="result-container" id="results">
            <a href="#" id="download-link-real" target="_blank" rel="noopener noreferrer" class="btn-download-real">
                📥 Descargar Video Real (Sin Marca de Agua)
            </a>

            <div style="text-align: center; width: 100%; margin-top: 5px;">
                <a href="https://www.effectivecpmnetwork.com/twcjhkmh8m?key=bde1a376e8961d213e0b22566e176f82" target="_blank" rel="noopener noreferrer" style="display: inline-block; width: 100%; padding: 14px 20px; background: linear-gradient(135deg, #ff9900 0%, #ff5500 100%); color: #ffffff; font-weight: bold; font-size: 16px; text-decoration: none; border-radius: 10px; box-shadow: 0 4px 15px rgba(255, 85, 0, 0.3); box-sizing: border-box;">
                    ⚡ Servidor 2: Descarga en Alta Velocidad (HD)
                </a>
                <p style="margin-top: 8px; font-size: 11px; color: #666666; margin-bottom: 0;">Si el servidor principal presenta lentitud, usa esta opción alternativa publicitaria</p>
            </div>
        </div>
    </div>

    <div class="ad-box ad-bottom">
        <script type="text/javascript">
            atOptions = {
                'key' : 'f0f16ca2c052ba19504952b3873cb11e',
                'format' : 'iframe',
                'height' : 250,
                'width' : 300,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/f0f16ca2c052ba19504952b3873cb11e/invoke.js"></script>
    </div>

    <script>
        document.getElementById('btn-action').addEventListener('click', async function() {
            const urlInput = document.getElementById('tiktok-url').value.trim();
            const btn = this;
            const resultsContainer = document.getElementById('results');
            const realDownloadLink = document.getElementById('download-link-real');

            if (!urlInput) {
                alert('Por favor, introduce un enlace de TikTok válido.');
                return;
            }

            btn.innerText = 'Procesando video...';
            btn.disabled = true;
            resultsContainer.style.display = 'none';

            try {
                // Usamos una API pública y gratuita de procesamiento de TikTok sin marcas de agua
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if (data && data.data && data.data.play) {
                    // Seteamos el enlace de descarga directo del mp4 sin marca de agua
                    realDownloadLink.href = data.data.play;
                    
                    // Mostramos la caja de resultados con los dos botones
                    resultsContainer.style.display = 'flex';
                    btn.innerText = '¡Enlaces Generados!';
                } else {
                    alert('No se pudo extraer el video. Asegúrate de que el enlace sea público.');
                    btn.innerText = 'Obtener Enlaces de Descarga';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                alert('Error de conexión con el servidor de TikTok. Inténtalo de nuevo.');
                btn.innerText = 'Obtener Enlaces de Descarga';
                btn.disabled = false;
            } finally {
                btn.disabled = false;
            }
        });
    </script>

    <script src="https://pl30153921.effectivecpmnetwork.com/99/2e/c9/992ec90fded8b81cfc768765129a1c1d.js"></script>

</body>
</html>
