<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargador de Videos de TikTok</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: #0084d6;
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 700;
        }
        .input-container {
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #ccd0d5;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fca0a01a;
        }
        .btn-descargar {
            width: 100%;
            padding: 16px;
            background-color: #0084d6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        .btn-descargar:active {
            background-color: #005fa3;
        }
        .ad-box {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .ad-top {
            max-width: 728px;
            min-height: 90px;
        }
        .ad-bottom {
            max-width: 300px;
            min-height: 250px;
        }
    </style>
</head>
<body>

    <!-- BANNER SUPERIOR (728x90) -->
    <div class="ad-box ad-top">
        <script type="text/javascript">
            atOptions = {
                'key' : 'a2fc1372fb0ce2568dbe11274debc73d',
                'format' : 'iframe',
                'height' : 90,
                'width' : 728,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/a2fc1372fb0ce2568dbe11274debc73d/invoke.js"></script>
    </div>

    <!-- TARJETA PRINCIPAL -->
    <div class="container">
        <h1>Descargador de Videos de TikTok</h1>
        
        <div class="input-container">
            <input type="text" id="tiktok-url" placeholder="Introduce el enlace de TikTok aquí...">
        </div>
        
        <!-- CAMBIADO: TEXTO NUEVO Y ID ASIGNADO -->
        <button class="btn-descargar" id="btn-action">Descargar Video</button>

        <!-- BOTÓN DEL SMARTLINK (SERVIDOR 2) -->
        <div style="text-align: center; width: 100%;">
            <a href="https://www.effectivecpmnetwork.com/twcjhkmh8m?key=bde1a376e8961d213e0b22566e176f82" target="_blank" rel="noopener noreferrer" style="display: inline-block; width: 100%; padding: 14px 20px; background: linear-gradient(135deg, #ff9900 0%, #ff5500 100%); color: #ffffff; font-weight: bold; font-size: 16px; text-decoration: none; border-radius: 10px; box-shadow: 0 4px 15px rgba(255, 85, 0, 0.3); box-sizing: border-box;">
                ⚡ Servidor 2: Descarga en Alta Velocidad (HD)
            </a>
            <p style="margin-top: 8px; font-size: 12px; color: #666666; margin-bottom: 0;">Si el servidor principal presenta lentitud, usa esta opción alternativa</p>
        </div>
    </div>

    <!-- BANNER INFERIOR (300x250) -->
    <div class="ad-box ad-bottom">
        <script type="text/javascript">
            atOptions = {
                'key' : 'f0f16ca2c052ba19504952b3873cb11e',
                'format' : 'iframe',
                'height' : 250,
                'width' : 300,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/f0f16ca2c052ba19504952b3873cb11e/invoke.js"></script>
    </div>

    <!-- SCRIPT DE ACCIÓN PARA EVITAR QUE SE QUEDE TRABADO -->
    <script>
        document.getElementById('btn-action').addEventListener('click', function() {
            const input = document.getElementById('tiktok-url').value;
            if (!input) {
                alert('Por favor, introduce un enlace de TikTok válido.');
                return;
            }
            
            const btn = this;
            btn.innerText = 'Procesando descarga...';
            btn.style.backgroundColor = '#6c757d';
            btn.disabled = true;

            // Aquí simula la respuesta. Si tienes un backend o API, se conectaría aquí.
            setTimeout(() => {
                btn.innerText = 'Descargar Video';
                btn.style.backgroundColor = '#0084d6';
                btn.disabled = false;
                
                // Abre el Smartlink o la descarga para asegurar que cuente el clic si el Popunder lo bloqueó
                window.open("https://www.effectivecpmnetwork.com/twcjhkmh8m?key=bde1a376e8961d213e0b22566e176f82", "_blank");
            }, 1500);
        });
    </script>

    <!-- SCRIPT INVISIBLE DEL POPUNDER -->

</body>
</html>
